name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker compose build backend

      - name: Ruff check
        run: docker compose run --rm backend uv run ruff check .

      - name: Ruff format check
        run: docker compose run --rm backend uv run ruff format . --check

      - name: Pyright
        run: docker compose run --rm backend uv run pyright

      - name: Pytest
        run: docker compose run --rm backend uv run pytest
